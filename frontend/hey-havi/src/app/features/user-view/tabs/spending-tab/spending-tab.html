<div class="spending-tab fade-in-up">
  <app-spending-summary />

  @if (ctx.profile(); as p) {
    <div class="spending-tab__tip card">
      <p class="spending-tab__tip-title">💡 Insight de Havi</p>
      <p class="spending-tab__tip-text">
        Tu mayor gasto es en <strong>{{ p.spending_summary[0]?.category }}</strong>
        con {{ p.spending_summary[0]?.percentage }}% del total.
        Como <em>{{ p.persona?.lifestyle }}</em>, esto es consistente con tu perfil.
      </p>
    </div>
  }
</div>
